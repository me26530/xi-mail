name: Deploy Xi-Mail

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: xi-mail-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Xi-Mail
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write wrangler.toml from GitHub Secret
        env:
          WRANGLER_TOML_MAIN: ${{ secrets.WRANGLER_TOML }}
        run: |
          if [ -z "$WRANGLER_TOML_MAIN" ]; then
            echo "ERROR: GitHub Secret WRANGLER_TOML is empty or not set."
            exit 1
          fi

          printf '%s\n' "$WRANGLER_TOML_MAIN" > mail-worker/wrangler.toml

          echo "Generated mail-worker/wrangler.toml:"
          sed -n '1,40p' mail-worker/wrangler.toml

          if ! grep -q '^main *= *"src/index.js"' mail-worker/wrangler.toml; then
            echo "ERROR: wrangler.toml does not contain main = \"src/index.js\""
            exit 1
          fi

      - name: Fix frontend package dependencies
        working-directory: mail-view
        run: |
          echo "Fixing package.json platform-specific dependencies..."

          npm pkg delete dependencies.@tailwindcss/oxide-win32-x64-msvc || true
          npm pkg delete devDependencies.@tailwindcss/oxide-win32-x64-msvc || true
          npm pkg delete optionalDependencies.@tailwindcss/oxide-win32-x64-msvc || true

          npm pkg delete dependencies.@tailwindcss/oxide-win32-ia32-msvc || true
          npm pkg delete devDependencies.@tailwindcss/oxide-win32-ia32-msvc || true
          npm pkg delete optionalDependencies.@tailwindcss/oxide-win32-ia32-msvc || true

          npm pkg delete dependencies.@tailwindcss/oxide-win32-arm64-msvc || true
          npm pkg delete devDependencies.@tailwindcss/oxide-win32-arm64-msvc || true
          npm pkg delete optionalDependencies.@tailwindcss/oxide-win32-arm64-msvc || true

          echo "Downgrading vite to v6 for @vitejs/plugin-vue v5 compatibility..."
          npm pkg set devDependencies.vite="^6.3.5"

          echo "Cleaning frontend lockfile and node_modules..."
          rm -f package-lock.json
          rm -rf node_modules

      - name: Install frontend dependencies
        working-directory: mail-view
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: mail-view
        env:
          VITE_WORKER_URL: ${{ vars.VITE_WORKER_URL }}
        run: npm run build

      - name: Clean worker dependencies
        working-directory: mail-worker
        run: |
          rm -rf node_modules

      - name: Install worker dependencies
        working-directory: mail-worker
        run: npm install --legacy-peer-deps

      - name: Check worker files before deploy
        working-directory: mail-worker
        run: |
          echo "Current directory:"
          pwd

          echo "Files:"
          ls -la

          echo "src files:"
          ls -la src || true

          echo "wrangler.toml:"
          sed -n '1,80p' wrangler.toml

          if [ ! -f "src/index.js" ]; then
            echo "ERROR: mail-worker/src/index.js not found."
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: mail-worker
          command: deploy --config wrangler.toml
